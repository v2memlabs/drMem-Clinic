name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Architecture tests
        run: flutter test test/architecture/

      - name: Full test suite
        run: flutter test

  production-release-build:
    runs-on: ubuntu-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      - name: Release web build (production dart-define)
        run: |
          flutter build web --release \
            --dart-define=DATA_BACKEND=supabase \
            --dart-define=APP_ENV=production \
            --dart-define=SUPABASE_URL=https://ci-placeholder.supabase.co \
            --dart-define=SUPABASE_ANON_KEY=ci-placeholder-anon-key
