publish_to: 'none'
version: 0.1.0
environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  go_router: ^8.0.0
  collection: ^1.18.0
  shared_preferences: ^2.2.3
  pdf: ^3.11.3
  printing: ^5.14.2
  supabase_flutter: ^2.8.4
  file_picker: ^8.1.7
  image_picker: ^1.1.2
  url_launcher: ^6.3.1
  signature: ^5.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
    - assets/fonts/
    - assets/icd/
    - assets/config/staging.json
